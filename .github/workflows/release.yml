---
name: "Release"

on:
  push:
    paths:
      - 'custom_components/**'
  workflow_dispatch:

jobs:
  test:
    name: "Run Tests"
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        python-version: [ '3.14' ]

    steps:
      - name: "вњЏпёЏ Checkout code"
        uses: actions/checkout@v7

      - name: рџђЌ Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: "рџ“¦ Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: "рџ§Є Run tests"
        run: |
          python -m pytest tests/ -v

  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    needs: test
    environment:
      name: release
    steps:
      - name: "вњЏпёЏ Checkout code"
        uses: actions/checkout@v7
        with: 
          path: './'

      - name: "рџЏ·пёЏ Get version tag"
        id: set_var
        run: |
          VERSION=$(jq -r .version custom_components/*/manifest.json)
          echo "COMPONENT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "component_version=$VERSION" >> "$GITHUB_OUTPUT"

          BRANCH_NAME="${GITHUB_REF_NAME}"

          if [ "$BRANCH_NAME" = "main" ]; then
            RELEASE_TAG="v${VERSION}"
            IS_PRERELEASE=false
          else
            BETA_PREFIX="v${VERSION}-beta."
            HIGHEST_BETA=$(git ls-remote --tags origin "refs/tags/${BETA_PREFIX}*" \
              | awk -F/ '{print $3}' \
              | sed -n "s/^${BETA_PREFIX//./\\.}//p" \
              | grep -E '^[0-9]+$' \
              | sort -n \
              | tail -n 1)

            if [ -n "$HIGHEST_BETA" ]; then
              NEXT_BETA=$((HIGHEST_BETA + 1))
            else
              NEXT_BETA=1
            fi

            RELEASE_TAG="${BETA_PREFIX}${NEXT_BETA}"
            IS_PRERELEASE=true
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: "рџЏ·пёЏ Check if tag exists already"
        uses: mukunku/tag-exists-action@v1.7.0
        id: "check_tag"
        with: 
          tag: "${{ steps.set_var.outputs.release_tag }}"

      - name: "вќЊ Cancel if tag is already present"
        run: |
          echo "Tag already present: ${{ steps.set_var.outputs.release_tag }}. Not creating a new release"
          gh run cancel ${{ github.run_id }}
          gh run watch ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.check_tag.outputs.exists == 'true'

      - name: "рџЏ·пёЏ Create new tag"
        uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: "${{ steps.set_var.outputs.release_tag }}"
          tag_exists_error: false
          message: "Version ${{ steps.set_var.outputs.component_version }}"
      # if: steps.check_tag.outputs.exists == 'false'

      - name: "рџ“¦ Create GitHub release"
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ steps.set_var.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          name: "Version ${{ steps.set_var.outputs.component_version }}"
          tag_name: "${{ steps.set_var.outputs.release_tag }}"